<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Médico Gallo - Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = JSON.parse(window.__firebase_config || "{}");
        const appId = typeof __app_id !== "undefined" ? __app_id : "centro-medico-gallo";
        const allowedEmails = JSON.parse(window.__allowed_emails || '["recepcion1@gallomed.com","recepcion2@gallomed.com"]');

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let currentUser = null;
        let turnosUnsubscribe = null;
        const medicos = ["BERNAUDO", "BOCCA", "CANTARELLA", "COLL", "EKIZIAN", "FELIPPO", "GARCIA", "LOPEZ CABANILLAS", "PINON", "PUENTES"];

        function getMainContent() {
            return document.getElementById("main-content");
        }

        function getLoadingOverlay() {
            return document.getElementById("loading-overlay");
        }

        function getTurnosCollectionRef() {
            return collection(db, "artifacts", appId, "public", "data", "turnos");
        }

        function getLocalISODate(date = new Date()) {
            const offsetMs = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - offsetMs).toISOString().slice(0, 10);
        }

        function isAllowedUser(user) {
            if (!user || !user.email) {
                return false;
            }
            return allowedEmails.includes(user.email.toLowerCase());
        }

        function cleanText(value) {
            return String(value || "").trim().replace(/\s+/g, " ");
        }

        function parseTurnoForm(formData) {
            return {
                medicoId: cleanText(formData.get("medico")),
                paciente: cleanText(formData.get("paciente")),
                dni: cleanText(formData.get("dni")),
                fecha: cleanText(formData.get("fecha")),
                hora: cleanText(formData.get("hora")),
                telefono: cleanText(formData.get("telefono")),
                obraSocial: cleanText(formData.get("obraSocial")),
                primeraVez: formData.get("primeraVez") === "on",
                nota: cleanText(formData.get("nota"))
            };
        }

        function validateTurnoData(turnoData) {
            if (!medicos.includes(turnoData.medicoId)) {
                return "Debe seleccionar un profesional válido.";
            }

            if (!/^\d{7,10}$/.test(turnoData.dni)) {
                return "El DNI debe tener entre 7 y 10 dígitos.";
            }

            if (turnoData.telefono && !/^[+()\-\s\d]{6,20}$/.test(turnoData.telefono)) {
                return "El teléfono contiene caracteres no permitidos.";
            }

            if (!/^([01]\d|2[0-3]):[0-5]\d$/.test(turnoData.hora)) {
                return "La hora no tiene un formato válido.";
            }

            const [hour] = turnoData.hora.split(":").map(Number);
            if (hour < 8 || hour > 20) {
                return "El horario permitido es de 08:00 a 20:59.";
            }

            if (!/^\d{4}-\d{2}-\d{2}$/.test(turnoData.fecha)) {
                return "La fecha no tiene un formato válido.";
            }

            if (turnoData.fecha < getLocalISODate()) {
                return "No se pueden registrar turnos en fechas pasadas.";
            }

            if (!turnoData.paciente || turnoData.paciente.length < 3) {
                return "El nombre del paciente es demasiado corto.";
            }

            return null;
        }

        async function existeTurnoDuplicado(turnoData) {
            const q = query(getTurnosCollectionRef(), where("fecha", "==", turnoData.fecha));
            const snapshot = await getDocs(q);
            return snapshot.docs.some((turnoDoc) => {
                const data = turnoDoc.data();
                return data.medicoId === turnoData.medicoId && data.hora === turnoData.hora;
            });
        }

        function stopTurnosSubscription() {
            if (turnosUnsubscribe) {
                turnosUnsubscribe();
                turnosUnsubscribe = null;
            }
        }

        function showLoading(show) {
            const loadingOverlay = getLoadingOverlay();
            if (!loadingOverlay) {
                return;
            }
            loadingOverlay.classList.toggle("hidden", !show);
        }

        function showToast(msg, type = "success") {
            const toast = document.createElement("div");
            toast.className = `fixed bottom-6 right-6 px-8 py-4 rounded-2xl text-white shadow-2xl transition-all z-[200] flex items-center gap-3 font-bold duration-300 ${type === "success" ? "bg-slate-900 border-b-4 border-green-500" : "bg-red-600"}`;

            const icon = document.createElement("i");
            icon.className = `fas ${type === "success" ? "fa-check-circle text-green-400" : "fa-exclamation-circle"} text-xl`;

            const text = document.createElement("span");
            text.textContent = msg;

            toast.appendChild(icon);
            toast.appendChild(text);
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add("opacity-0");
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function renderConfigError() {
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-2xl mx-auto p-6 mt-8">
                    <div class="bg-red-50 border border-red-200 rounded-2xl p-6">
                        <h2 class="text-xl font-black text-red-700 mb-2">Configuración Firebase incompleta</h2>
                        <p class="text-red-600 text-sm">
                            Definí window.__firebase_config en tu despliegue (Netlify) antes de usar la aplicación.
                        </p>
                    </div>
                </div>
            `;
        }

        function renderLogin() {
            stopTurnosSubscription();
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-md mx-auto p-4 md:p-8 mt-8">
                    <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                        <div class="bg-blue-600 p-8 text-white">
                            <h2 class="text-3xl font-bold">Ingreso al Sistema</h2>
                            <p class="opacity-80 mt-1">Solo personal autorizado</p>
                        </div>
                        <form id="login-form" class="p-8 space-y-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Correo</label>
                                <input type="email" name="email" required autocomplete="username" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="usuario@dominio.com">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Clave</label>
                                <input type="password" name="password" required autocomplete="current-password" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="********">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-[0.98]">
                                INGRESAR
                            </button>
                        </form>
                    </div>
                </div>
            `;

            const loginForm = document.getElementById("login-form");
            loginForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                const formData = new FormData(loginForm);
                const email = cleanText(formData.get("email")).toLowerCase();
                const password = String(formData.get("password") || "");

                if (!allowedEmails.includes(email)) {
                    showToast("Usuario no habilitado para este sistema.", "error");
                    return;
                }

                try {
                    showLoading(true);
                    await signInWithEmailAndPassword(auth, email, password);
                    showToast("Ingreso correcto", "success");
                } catch (error) {
                    console.error("Error de login:", error);
                    showToast("No se pudo iniciar sesión", "error");
                } finally {
                    showLoading(false);
                }
            });
        }

        function createTurnoCard(turno) {
            const card = document.createElement("div");
            card.className = "group flex items-center justify-between p-5 border border-slate-100 rounded-2xl hover:border-blue-200 hover:bg-blue-50/30 transition-all bg-white shadow-sm";

            const left = document.createElement("div");
            left.className = "flex items-center gap-5";

            const hora = document.createElement("div");
            hora.className = "bg-blue-600 text-white font-black px-4 py-2 rounded-xl text-sm shadow-md shadow-blue-100";
            hora.textContent = turno.hora;

            const details = document.createElement("div");

            const paciente = document.createElement("h4");
            paciente.className = "font-bold text-slate-800 text-lg";
            paciente.textContent = turno.paciente;

            const meta = document.createElement("div");
            meta.className = "flex gap-3 mt-1";

            const medico = document.createElement("span");
            medico.className = "text-xs font-bold text-blue-500 uppercase tracking-tighter";
            medico.textContent = `Dr. ${turno.medicoId}`;

            const dni = document.createElement("span");
            dni.className = "text-xs font-medium text-slate-400";
            dni.textContent = `DNI: ${turno.dni}`;

            meta.appendChild(medico);
            meta.appendChild(dni);
            details.appendChild(paciente);
            details.appendChild(meta);

            left.appendChild(hora);
            left.appendChild(details);

            const right = document.createElement("div");
            right.className = "flex items-center gap-3";

            const obraSocial = document.createElement("span");
            obraSocial.className = "hidden md:block text-[10px] px-3 py-1 rounded-full bg-slate-100 text-slate-500 font-black uppercase";
            obraSocial.textContent = turno.obraSocial || "S/O";

            right.appendChild(obraSocial);

            card.appendChild(left);
            card.appendChild(right);
            return card;
        }

        function renderEmptyTurnosState(listEl, countEl) {
            listEl.innerHTML = `
                <div class="text-center py-20 bg-slate-50 rounded-3xl border-2 border-dashed border-slate-200">
                    <div class="bg-white w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                        <i class="fas fa-calendar-alt text-slate-300 text-2xl"></i>
                    </div>
                    <p class="text-slate-500 font-medium">No hay turnos para el día de hoy</p>
                    <button id="btn-crear-primero" class="mt-4 text-blue-600 font-bold hover:underline">Crear el primero</button>
                </div>`;

            const btnCrear = document.getElementById("btn-crear-primero");
            if (btnCrear) {
                btnCrear.addEventListener("click", renderForm);
            }

            countEl.textContent = "0";
        }

        function subscribeToTurnos() {
            if (!currentUser) {
                return;
            }

            stopTurnosSubscription();
            const hoyStr = getLocalISODate();
            const q = query(getTurnosCollectionRef(), where("fecha", "==", hoyStr));

            turnosUnsubscribe = onSnapshot(q, (snapshot) => {
                const listEl = document.getElementById("lista-turnos");
                const countEl = document.getElementById("count-hoy");

                if (!listEl || !countEl) {
                    return;
                }

                if (snapshot.empty) {
                    renderEmptyTurnosState(listEl, countEl);
                    return;
                }

                const turnosSorted = snapshot.docs
                    .map((turnoDoc) => ({ id: turnoDoc.id, ...turnoDoc.data() }))
                    .sort((a, b) => a.hora.localeCompare(b.hora));

                countEl.textContent = String(turnosSorted.length);
                listEl.innerHTML = "";

                turnosSorted.forEach((turno) => {
                    listEl.appendChild(createTurnoCard(turno));
                });
            }, (error) => {
                console.error("Error en snapshot:", error);
                showToast("Error al sincronizar datos", "error");
            });
        }

        async function guardarTurno(event) {
            event.preventDefault();
            if (!currentUser) {
                return;
            }

            const formData = new FormData(event.target);
            const turnoData = parseTurnoForm(formData);
            const validationError = validateTurnoData(turnoData);
            if (validationError) {
                showToast(validationError, "error");
                return;
            }

            try {
                showLoading(true);

                const hayDuplicado = await existeTurnoDuplicado(turnoData);
                if (hayDuplicado) {
                    showToast("Ya existe un turno para ese profesional en ese horario.", "error");
                    return;
                }

                await addDoc(getTurnosCollectionRef(), {
                    ...turnoData,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    createdAt: new Date().toISOString()
                });

                showToast("Turno confirmado", "success");
                renderDashboard();
            } catch (error) {
                console.error("Error al guardar turno:", error);
                showToast("Error al guardar el turno", "error");
            } finally {
                showLoading(false);
            }
        }

        function escapeCsvValue(value) {
            const stringValue = String(value ?? "");
            if (stringValue.includes(",") || stringValue.includes("\n") || stringValue.includes('"')) {
                return `"${stringValue.replace(/"/g, '""')}"`;
            }
            return stringValue;
        }

        async function exportarTurnosHoyCSV() {
            try {
                showLoading(true);
                const hoyStr = getLocalISODate();
                const q = query(getTurnosCollectionRef(), where("fecha", "==", hoyStr));
                const snapshot = await getDocs(q);

                if (snapshot.empty) {
                    showToast("No hay turnos para exportar hoy.", "error");
                    return;
                }

                const turnosSorted = snapshot.docs
                    .map((turnoDoc) => turnoDoc.data())
                    .sort((a, b) => a.hora.localeCompare(b.hora));

                const headers = ["fecha", "hora", "medico", "paciente", "dni", "telefono", "obraSocial", "primeraVez", "nota"];
                const rows = turnosSorted.map((turno) => [
                    escapeCsvValue(turno.fecha),
                    escapeCsvValue(turno.hora),
                    escapeCsvValue(turno.medicoId),
                    escapeCsvValue(turno.paciente),
                    escapeCsvValue(turno.dni),
                    escapeCsvValue(turno.telefono),
                    escapeCsvValue(turno.obraSocial),
                    escapeCsvValue(turno.primeraVez ? "SI" : "NO"),
                    escapeCsvValue(turno.nota)
                ]);

                const csvContent = [headers.join(","), ...rows.map((row) => row.join(","))].join("\n");
                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `turnos-${hoyStr}.csv`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);

                showToast("Exportación CSV generada", "success");
            } catch (error) {
                console.error("Error al exportar CSV:", error);
                showToast("No se pudo exportar el CSV", "error");
            } finally {
                showLoading(false);
            }
        }

        function renderDashboard() {
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-6xl mx-auto p-4 md:p-8">
                    <header class="flex flex-col md:flex-row justify-between items-center mb-8 gap-4">
                        <div>
                            <h1 class="text-3xl font-bold text-slate-800">Centro Médico Gallo</h1>
                            <p class="text-slate-500 font-medium">Gestión Profesional de Turnos</p>
                            <p class="text-xs text-slate-400 mt-1">Usuario: <span id="user-email"></span></p>
                        </div>
                        <div class="flex items-center gap-3">
                            <button id="btn-new-turno" class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-xl shadow-lg shadow-blue-200 transition-all flex items-center gap-2 transform active:scale-95">
                                <i class="fas fa-plus"></i> Nuevo Turno
                            </button>
                            <button id="btn-export-csv" class="bg-white border border-slate-200 hover:bg-slate-50 text-slate-700 px-4 py-3 rounded-xl font-bold transition-colors">
                                Exportar CSV
                            </button>
                            <button id="btn-logout" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-4 py-3 rounded-xl font-bold transition-colors">
                                Salir
                            </button>
                        </div>
                    </header>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                        <div class="lg:col-span-2 bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                            <div class="flex justify-between items-center mb-6">
                                <h2 class="text-xl font-bold text-slate-700 flex items-center gap-2">
                                    <i class="fas fa-calendar-day text-blue-500"></i> Agenda de Hoy
                                </h2>
                                <span class="text-sm bg-blue-50 text-blue-600 px-4 py-1.5 rounded-full font-bold">
                                    ${new Date().toLocaleDateString("es-AR", { day: "2-digit", month: "long" })}
                                </span>
                            </div>
                            <div id="lista-turnos" class="space-y-3">
                                <p class="text-slate-400 italic text-center py-12">Consultando disponibilidad...</p>
                            </div>
                        </div>

                        <div class="space-y-6">
                            <div class="bg-slate-900 p-6 rounded-2xl text-white shadow-xl relative overflow-hidden">
                                <div class="relative z-10">
                                    <h3 class="text-sm uppercase tracking-wider opacity-70 font-semibold">Turnos Totales</h3>
                                    <p class="text-5xl font-black mt-2" id="count-hoy">0</p>
                                </div>
                                <i class="fas fa-users absolute -right-4 -bottom-4 text-8xl opacity-10"></i>
                            </div>
                            <div class="bg-white p-6 rounded-2xl shadow-sm border border-slate-200">
                                <h3 class="text-slate-700 font-bold mb-4 flex items-center gap-2">
                                    <i class="fas fa-user-md text-blue-500"></i> Profesionales
                                </h3>
                                <div class="space-y-1 max-h-64 overflow-y-auto pr-2 custom-scrollbar">
                                    ${medicos.map((m) => `
                                        <div class="flex items-center justify-between text-sm p-3 hover:bg-slate-50 rounded-xl transition-colors group">
                                            <span class="text-slate-600 font-medium group-hover:text-blue-600">${m}</span>
                                            <div class="w-2 h-2 rounded-full bg-green-400 shadow-[0_0_8px_rgba(74,222,128,0.5)]"></div>
                                        </div>
                                    `).join("")}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;

            const userEmailEl = document.getElementById("user-email");
            if (userEmailEl) {
                userEmailEl.textContent = currentUser.email || "(sin correo)";
            }

            const btnNewTurno = document.getElementById("btn-new-turno");
            if (btnNewTurno) {
                btnNewTurno.addEventListener("click", renderForm);
            }

            const btnLogout = document.getElementById("btn-logout");
            if (btnLogout) {
                btnLogout.addEventListener("click", async () => {
                    try {
                        await signOut(auth);
                        showToast("Sesión cerrada", "success");
                    } catch (error) {
                        console.error("Error al cerrar sesión:", error);
                        showToast("No se pudo cerrar sesión", "error");
                    }
                });
            }

            const btnExportCsv = document.getElementById("btn-export-csv");
            if (btnExportCsv) {
                btnExportCsv.addEventListener("click", exportarTurnosHoyCSV);
            }

            subscribeToTurnos();
        }

        function renderForm() {
            stopTurnosSubscription();
            const minDate = getLocalISODate();
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-3xl mx-auto p-4 md:p-8">
                    <button id="btn-volver" class="mb-6 text-slate-500 hover:text-blue-600 flex items-center gap-2 font-semibold transition-colors">
                        <i class="fas fa-chevron-left"></i> Volver a la agenda
                    </button>

                    <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                        <div class="bg-blue-600 p-8 text-white">
                            <h2 class="text-3xl font-bold">Nuevo Turno</h2>
                            <p class="opacity-80 mt-1">Complete la información para reservar el espacio</p>
                        </div>

                        <form id="form-turno" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Médico Responsable</label>
                                <select name="medico" required class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none transition-all appearance-none cursor-pointer">
                                    <option value="">Seleccione profesional...</option>
                                    ${medicos.map((m) => `<option value="${m}">${m}</option>`).join("")}
                                </select>
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Nombre del Paciente</label>
                                <input type="text" name="paciente" required minlength="3" maxlength="120" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="Nombre y Apellido">
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">DNI</label>
                                <input type="text" name="dni" inputmode="numeric" required pattern="\d{7,10}" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="Solo números">
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Fecha</label>
                                <input type="date" name="fecha" required min="${minDate}" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none">
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Hora</label>
                                <input type="time" name="hora" required min="08:00" max="20:59" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none">
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Teléfono</label>
                                <input type="tel" name="telefono" maxlength="20" placeholder="2345..." class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none">
                            </div>

                            <div class="space-y-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest">Obra Social</label>
                                <input type="text" name="obraSocial" maxlength="80" placeholder="Ej: IOMA, OSDE" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none">
                            </div>

                            <div class="md:col-span-2 flex items-center gap-4 bg-slate-50 p-4 rounded-2xl">
                                <input type="checkbox" name="primeraVez" id="primeraVez" class="w-6 h-6 rounded-lg accent-blue-600">
                                <label for="primeraVez" class="text-sm text-slate-600 font-bold cursor-pointer select-none">Es la primera vez que asiste al centro</label>
                            </div>

                            <div class="md:col-span-2">
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Observaciones</label>
                                <textarea name="nota" rows="3" maxlength="300" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="Añadir notas relevantes..."></textarea>
                            </div>

                            <div class="md:col-span-2 pt-4">
                                <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-[0.98]">
                                    RESERVAR TURNO
                                </button>
                            </div>
                        </form>
                    </div>
                </div>
            `;

            const btnVolver = document.getElementById("btn-volver");
            if (btnVolver) {
                btnVolver.addEventListener("click", renderDashboard);
            }

            const formTurno = document.getElementById("form-turno");
            if (formTurno) {
                formTurno.addEventListener("submit", guardarTurno);
            }
        }

        function validateFirebaseConfig() {
            return firebaseConfig && firebaseConfig.apiKey && firebaseConfig.projectId && firebaseConfig.appId;
        }

        function initApp() {
            if (!validateFirebaseConfig()) {
                renderConfigError();
                return;
            }

            onAuthStateChanged(auth, async (user) => {
                currentUser = user;

                if (!user) {
                    renderLogin();
                    return;
                }

                if (!isAllowedUser(user)) {
                    await signOut(auth);
                    showToast("Usuario no autorizado", "error");
                    return;
                }

                renderDashboard();
            });
        }

        window.renderDashboard = renderDashboard;
        window.onload = initApp;
    </script>
