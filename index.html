<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Médico Gallo - Gestión de Turnos</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <script>
        // Configuración runtime para Netlify.
        // Reemplazá estos valores por los de tu Web App en Firebase Console.
        window.__firebase_config = window.__firebase_config || {
            apiKey: "REEMPLAZAR_API_KEY",
            authDomain: "REEMPLAZAR_AUTH_DOMAIN",
            projectId: "REEMPLAZAR_PROJECT_ID",
            appId: "REEMPLAZAR_APP_ID"
        };

        // Opcional: podés sobreescribir esto desde otro script antes del módulo principal.
        window.__allowed_emails = window.__allowed_emails || JSON.stringify([
            "recepcion1@gallomed.com",
            "recepcion2@gallomed.com"
        ]);

        // Modo de persistencia: "local" (default) o "firebase".
        window.__storage_mode = window.__storage_mode || "local";
    </script>
    <script type="module">
        const appId = "centro-medico-gallo";
        const allowedEmails = JSON.parse(window.__allowed_emails || '["recepcion1@gallomed.com","recepcion2@gallomed.com"]');
        const requestedStorageMode = String(window.__storage_mode || "local").toLowerCase() === "firebase" ? "firebase" : "local";
        const TURNOS_STORAGE_KEY = `${appId}-turnos`;
        const SESSION_STORAGE_KEY = `${appId}-session`;
        const MEDICOS_STORAGE_KEY = `${appId}-medicos`;
        const CANCELACIONES_STORAGE_KEY = `${appId}-cancelaciones`;

        let currentUser = null;
        let turnosUnsubscribe = null;
        let authUnsubscribe = null;
        let activeStorageMode = "local";
        let firebaseApi = null;
        let selectedAgendaDate = getLocalISODate();
        let selectedMedicoId = null;
        const authListeners = [];
        const turnosListeners = [];
        const medicoListeners = [];

        function getMainContent() {
            return document.getElementById("main-content");
        }

        function getLoadingOverlay() {
            return document.getElementById("loading-overlay");
        }

        function getLocalISODate(date = new Date()) {
            const offsetMs = date.getTimezoneOffset() * 60000;
            return new Date(date.getTime() - offsetMs).toISOString().slice(0, 10);
        }

        function parseISODate(isoDate) {
            const [year, month, day] = String(isoDate || "").split("-").map(Number);
            return new Date(year || 1970, (month || 1) - 1, day || 1);
        }

        function addDaysToISODate(isoDate, days) {
            const date = parseISODate(isoDate);
            date.setDate(date.getDate() + days);
            return getLocalISODate(date);
        }

        function formatDateLong(isoDate) {
            return parseISODate(isoDate).toLocaleDateString("es-AR", { day: "2-digit", month: "long", year: "numeric" });
        }

        function getDayOfWeek(isoDate) {
            const days = ["domingo", "lunes", "martes", "miércoles", "jueves", "viernes", "sábado"];
            return days[parseISODate(isoDate).getDay()];
        }

        function readStoredMedicos() {
            try {
                const raw = localStorage.getItem(MEDICOS_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error("Error leyendo médicos:", error);
                return [];
            }
        }

        function writeStoredMedicos(medicos) {
            localStorage.setItem(MEDICOS_STORAGE_KEY, JSON.stringify(medicos));
            emitMedicosChanged();
        }

        function getMedicoById(id) {
            return readStoredMedicos().find((m) => m.id === id);
        }

        function createMedico(nombre, especialidad, horaInicio = "08:00", horaFin = "17:00") {
            const medicos = readStoredMedicos();
            const newMedico = {
                id: `medico-${Date.now()}-${Math.random().toString(16).slice(2)}`,
                nombre: cleanText(nombre),
                especialidad: cleanText(especialidad),
                turnos: [
                    { nombre: "Mañana", horaInicio, horaFin: "12:30" },
                    { nombre: "Tarde", horaInicio: "14:00", horaFin }
                ],
                diasTrabajo: [1, 2, 3, 4, 5],
                estado: "activo",
                vacacionesDesde: null,
                vacacionesHasta: null,
                createdAt: new Date().toISOString()
            };
            medicos.push(newMedico);
            writeStoredMedicos(medicos);
            return newMedico;
        }

        function updateMedico(id, updates) {
            const medicos = readStoredMedicos();
            const idx = medicos.findIndex((m) => m.id === id);
            if (idx >= 0) {
                medicos[idx] = { ...medicos[idx], ...updates, updatedAt: new Date().toISOString() };
                writeStoredMedicos(medicos);
            }
        }

        function deleteMedico(id) {
            const medicos = readStoredMedicos().filter((m) => m.id !== id);
            writeStoredMedicos(medicos);
        }

        function emitMedicosChanged() {
            medicoListeners.forEach((listener) => {
                try {
                    listener();
                } catch (error) {
                    console.error("Error notificando cambios de médicos:", error);
                }
            });
        }

        function readStoredCancelaciones() {
            try {
                const raw = localStorage.getItem(CANCELACIONES_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error("Error leyendo cancelaciones:", error);
                return [];
            }
        }

        function writeStoredCancelaciones(cancelaciones) {
            localStorage.setItem(CANCELACIONES_STORAGE_KEY, JSON.stringify(cancelaciones));
        }

        function cancelarTurno(turnoId, razon = "") {
            const cancelaciones = readStoredCancelaciones();
            cancelaciones.push({
                id: `cancelacion-${Date.now()}`,
                turnoId,
                razon: cleanText(razon),
                canceledAt: new Date().toISOString()
            });
            writeStoredCancelaciones(cancelaciones);
        }

        function isTurnoCancelado(turnoId) {
            return readStoredCancelaciones().some((c) => c.turnoId === turnoId);
        }

        function isEnVacaciones(medicoId, fecha) {
            const medico = getMedicoById(medicoId);
            if (!medico || !medico.vacacionesDesde || !medico.vacacionesHasta) {
                return false;
            }
            return fecha >= medico.vacacionesDesde && fecha <= medico.vacacionesHasta;
        }

        function getFirebaseConfig() {
            try {
                if (!window.__firebase_config) {
                    return null;
                }

                if (typeof window.__firebase_config === "string") {
                    return JSON.parse(window.__firebase_config);
                }

                if (typeof window.__firebase_config === "object") {
                    return window.__firebase_config;
                }

                return null;
            } catch (error) {
                console.error("Error parseando __firebase_config:", error);
                return null;
            }
        }

        function hasValidFirebaseConfig(config) {
            if (!config || typeof config !== "object") {
                return false;
            }

            const required = ["apiKey", "authDomain", "projectId", "appId"];
            return required.every((key) => {
                const value = String(config[key] || "").trim();
                return value && !value.startsWith("REEMPLAZAR_");
            });
        }

        async function initFirebaseServices() {
            const firebaseConfig = getFirebaseConfig();
            if (!hasValidFirebaseConfig(firebaseConfig)) {
                return false;
            }

            try {
                const [firebaseAppModule, firebaseAuthModule, firebaseFirestoreModule] = await Promise.all([
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js"),
                    import("https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js")
                ]);

                const app = firebaseAppModule.initializeApp(firebaseConfig);
                const auth = firebaseAuthModule.getAuth(app);
                const db = firebaseFirestoreModule.getFirestore(app);

                firebaseApi = {
                    auth,
                    db,
                    onAuthStateChanged: firebaseAuthModule.onAuthStateChanged,
                    signInWithEmailAndPassword: firebaseAuthModule.signInWithEmailAndPassword,
                    signOut: firebaseAuthModule.signOut,
                    collection: firebaseFirestoreModule.collection,
                    addDoc: firebaseFirestoreModule.addDoc,
                    getDocs: firebaseFirestoreModule.getDocs,
                    query: firebaseFirestoreModule.query,
                    where: firebaseFirestoreModule.where,
                    onSnapshot: firebaseFirestoreModule.onSnapshot
                };

                return true;
            } catch (error) {
                console.error("Error inicializando Firebase:", error);
                firebaseApi = null;
                return false;
            }
        }

        function getTurnosCollectionRefFirebase() {
            return firebaseApi.collection(firebaseApi.db, "artifacts", appId, "public", "data", "turnos");
        }

        function readStoredTurnos() {
            try {
                const raw = localStorage.getItem(TURNOS_STORAGE_KEY);
                const parsed = raw ? JSON.parse(raw) : [];
                return Array.isArray(parsed) ? parsed : [];
            } catch (error) {
                console.error("Error leyendo turnos de localStorage:", error);
                return [];
            }
        }

        function writeStoredTurnos(turnos) {
            localStorage.setItem(TURNOS_STORAGE_KEY, JSON.stringify(turnos));
        }

        function getTurnosByDate(fecha) {
            return readStoredTurnos()
                .filter((turno) => turno.fecha === fecha)
                .sort((a, b) => String(a.hora || "").localeCompare(String(b.hora || "")));
        }

        function emitTurnosChanged() {
            turnosListeners.forEach((listener) => {
                try {
                    listener();
                } catch (error) {
                    console.error("Error notificando cambios de turnos:", error);
                }
            });
        }

        function emitAuthChanged() {
            authListeners.forEach((listener) => {
                try {
                    listener(currentUser);
                } catch (error) {
                    console.error("Error notificando cambios de sesión:", error);
                }
            });
        }

        function getUidFromEmail(email) {
            return String(email || "").replace(/[^a-z0-9]/gi, "-").toLowerCase();
        }

        function restoreSession() {
            try {
                const rawSession = sessionStorage.getItem(SESSION_STORAGE_KEY);
                if (!rawSession) {
                    currentUser = null;
                    return;
                }

                const session = JSON.parse(rawSession);
                if (!session || !session.email || !isAllowedUser(session)) {
                    currentUser = null;
                    sessionStorage.removeItem(SESSION_STORAGE_KEY);
                    return;
                }

                currentUser = {
                    uid: session.uid || getUidFromEmail(session.email),
                    email: String(session.email).toLowerCase()
                };
            } catch (error) {
                console.error("No se pudo restaurar la sesión:", error);
                currentUser = null;
                sessionStorage.removeItem(SESSION_STORAGE_KEY);
            }
        }

        async function signInLocal(email, password) {
            const normalizedEmail = cleanText(email).toLowerCase();
            if (!allowedEmails.includes(normalizedEmail)) {
                throw new Error("Usuario no habilitado");
            }

            if (!String(password || "").trim()) {
                throw new Error("Clave inválida");
            }

            currentUser = {
                uid: getUidFromEmail(normalizedEmail),
                email: normalizedEmail
            };

            sessionStorage.setItem(SESSION_STORAGE_KEY, JSON.stringify(currentUser));
            emitAuthChanged();
            return currentUser;
        }

        async function signOutLocal() {
            currentUser = null;
            sessionStorage.removeItem(SESSION_STORAGE_KEY);
            emitAuthChanged();
        }

        async function signInUser(email, password) {
            if (activeStorageMode === "firebase" && firebaseApi) {
                const credential = await firebaseApi.signInWithEmailAndPassword(firebaseApi.auth, email, password);
                return credential.user;
            }

            return signInLocal(email, password);
        }

        async function signOutUser() {
            if (activeStorageMode === "firebase" && firebaseApi) {
                await firebaseApi.signOut(firebaseApi.auth);
                return;
            }

            await signOutLocal();
        }

        function subscribeAuthState(callback) {
            if (activeStorageMode === "firebase" && firebaseApi) {
                return firebaseApi.onAuthStateChanged(firebaseApi.auth, callback);
            }

            return onAuthStateChangedLocal(callback);
        }

        function onAuthStateChangedLocal(callback) {
            authListeners.push(callback);
            callback(currentUser);
            return () => {
                const index = authListeners.indexOf(callback);
                if (index >= 0) {
                    authListeners.splice(index, 1);
                }
            };
        }

        function isAllowedUser(user) {
            if (!user || !user.email) {
                return false;
            }
            return allowedEmails.includes(user.email.toLowerCase());
        }

        function cleanText(value) {
            return String(value || "").trim().replace(/\s+/g, " ");
        }

        function parseTurnoForm(formData) {
            return {
                medicoId: cleanText(formData.get("medico")),
                paciente: cleanText(formData.get("paciente")),
                dni: cleanText(formData.get("dni")),
                fecha: cleanText(formData.get("fecha")),
                hora: cleanText(formData.get("hora")),
                telefono: cleanText(formData.get("telefono")),
                obraSocial: cleanText(formData.get("obraSocial")),
                primeraVez: formData.get("primeraVez") === "on",
                nota: cleanText(formData.get("nota"))
            };
        }

        function validateTurnoData(turnoData) {
            const medico = getMedicoById(turnoData.medicoId);
            if (!medico) {
                return "Debe seleccionar un profesional válido.";
            }

            if (isEnVacaciones(turnoData.medicoId, turnoData.fecha)) {
                return "El profesional seleccionado está de vacaciones en esa fecha.";
            }

            if (!/^\d{7,10}$/.test(turnoData.dni)) {
                return "El DNI debe tener entre 7 y 10 dígitos.";
            }

            if (turnoData.telefono && !/^[+()\-\s\d]{6,20}$/.test(turnoData.telefono)) {
                return "El teléfono contiene caracteres no permitidos.";
            }

            if (!/^([01]\d|2[0-3]):[0-5]\d$/.test(turnoData.hora)) {
                return "La hora no tiene un formato válido.";
            }

            if (!/^\d{4}-\d{2}-\d{2}$/.test(turnoData.fecha)) {
                return "La fecha no tiene un formato válido.";
            }

            if (turnoData.fecha < getLocalISODate()) {
                return "No se pueden registrar turnos en fechas pasadas.";
            }

            if (!turnoData.paciente || turnoData.paciente.length < 3) {
                return "El nombre del paciente es demasiado corto.";
            }

            return null;
        }

        function getHorariosDisponibles(medicoId, fecha) {
            const medico = getMedicoById(medicoId);
            if (!medico) {
                return [];
            }

            const dayOfWeek = parseISODate(fecha).getDay();
            if (!medico.diasTrabajo.includes(dayOfWeek)) {
                return [];
            }

            if (isEnVacaciones(medicoId, fecha)) {
                return [];
            }

            const horariosOcupados = readStoredTurnos()
                .filter((t) => t.medicoId === medicoId && t.fecha === fecha && !isTurnoCancelado(t.id))
                .map((t) => t.hora);

            const horarios = [];
            medico.turnos.forEach((turno) => {
                const [startHour, startMin] = turno.horaInicio.split(":").map(Number);
                const [endHour, endMin] = turno.horaFin.split(":").map(Number);

                for (let h = startHour; h < endHour; h++) {
                    for (let m = 0; m < 60; m += 30) {
                        const horaStr = `${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`;
                        if (!horariosOcupados.includes(horaStr)) {
                            horarios.push(horaStr);
                        }
                    }
                }
            });

            return horarios.sort();
        }

        async function existeTurnoDuplicado(turnoData) {
            const turnosFecha = await getTurnosForDate(turnoData.fecha);
            return turnosFecha.some((turno) => turno.medicoId === turnoData.medicoId && turno.hora === turnoData.hora);
        }

        async function getTurnosForDate(fecha) {
            if (activeStorageMode === "firebase" && firebaseApi) {
                const q = firebaseApi.query(getTurnosCollectionRefFirebase(), firebaseApi.where("fecha", "==", fecha));
                const snapshot = await firebaseApi.getDocs(q);
                return snapshot.docs
                    .map((turnoDoc) => ({ id: turnoDoc.id, ...turnoDoc.data() }))
                    .sort((a, b) => String(a.hora || "").localeCompare(String(b.hora || "")));
            }

            return getTurnosByDate(fecha);
        }

        async function getAllTurnos() {
            if (activeStorageMode === "firebase" && firebaseApi) {
                const snapshot = await firebaseApi.getDocs(getTurnosCollectionRefFirebase());
                return snapshot.docs
                    .map((turnoDoc) => ({ id: turnoDoc.id, ...turnoDoc.data() }))
                    .sort((a, b) => {
                        const dateCompare = String(a.fecha || "").localeCompare(String(b.fecha || ""));
                        if (dateCompare !== 0) {
                            return dateCompare;
                        }
                        return String(a.hora || "").localeCompare(String(b.hora || ""));
                    });
            }

            return readStoredTurnos().sort((a, b) => {
                const dateCompare = String(a.fecha || "").localeCompare(String(b.fecha || ""));
                if (dateCompare !== 0) {
                    return dateCompare;
                }
                return String(a.hora || "").localeCompare(String(b.hora || ""));
            });
        }

        async function saveTurno(turnoData) {
            if (activeStorageMode === "firebase" && firebaseApi) {
                await firebaseApi.addDoc(getTurnosCollectionRefFirebase(), {
                    ...turnoData,
                    userId: currentUser.uid,
                    userEmail: currentUser.email,
                    createdAt: new Date().toISOString()
                });
                return;
            }

            const storedTurnos = readStoredTurnos();
            storedTurnos.push({
                id: (window.crypto && crypto.randomUUID) ? crypto.randomUUID() : `${Date.now()}-${Math.random().toString(16).slice(2)}`,
                ...turnoData,
                userId: currentUser.uid,
                userEmail: currentUser.email,
                createdAt: new Date().toISOString()
            });
            writeStoredTurnos(storedTurnos);
            emitTurnosChanged();
        }

        function subscribeTurnosByDate(fecha, onData, onError) {
            if (activeStorageMode === "firebase" && firebaseApi) {
                const q = firebaseApi.query(getTurnosCollectionRefFirebase(), firebaseApi.where("fecha", "==", fecha));
                return firebaseApi.onSnapshot(q, (snapshot) => {
                    const turnos = snapshot.docs
                        .map((turnoDoc) => ({ id: turnoDoc.id, ...turnoDoc.data() }))
                        .sort((a, b) => String(a.hora || "").localeCompare(String(b.hora || "")));
                    onData(turnos);
                }, onError);
            }

            const renderTurnosLocal = async () => {
                try {
                    const turnos = await getTurnosForDate(fecha);
                    onData(turnos);
                } catch (error) {
                    onError(error);
                }
            };

            turnosListeners.push(renderTurnosLocal);
            renderTurnosLocal();

            return () => {
                const index = turnosListeners.indexOf(renderTurnosLocal);
                if (index >= 0) {
                    turnosListeners.splice(index, 1);
                }
            };
        }

        function stopTurnosSubscription() {
            if (turnosUnsubscribe) {
                turnosUnsubscribe();
                turnosUnsubscribe = null;
            }
        }

        function showLoading(show) {
            const loadingOverlay = getLoadingOverlay();
            if (!loadingOverlay) {
                return;
            }
            loadingOverlay.classList.toggle("hidden", !show);
        }

        function showToast(msg, type = "success") {
            const toast = document.createElement("div");
            toast.className = `fixed bottom-6 right-6 px-8 py-4 rounded-2xl text-white shadow-2xl transition-all z-[200] flex items-center gap-3 font-bold duration-300 ${type === "success" ? "bg-slate-900 border-b-4 border-green-500" : "bg-red-600"}`;

            const icon = document.createElement("i");
            icon.className = `fas ${type === "success" ? "fa-check-circle text-green-400" : "fa-exclamation-circle"} text-xl`;

            const text = document.createElement("span");
            text.textContent = msg;

            toast.appendChild(icon);
            toast.appendChild(text);
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.classList.add("opacity-0");
                setTimeout(() => toast.remove(), 500);
            }, 3000);
        }

        function renderConfigError() {
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-2xl mx-auto p-6 mt-8">
                    <div class="bg-red-50 border border-red-200 rounded-2xl p-6">
                        <h2 class="text-xl font-black text-red-700 mb-2">Configuración Firebase incompleta</h2>
                        <p class="text-red-600 text-sm">
                            Definí window.__firebase_config en tu despliegue (Netlify) antes de usar la aplicación.
                        </p>
                    </div>
                </div>
            `;
        }

        function renderLogin() {
            stopTurnosSubscription();
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }
            mainContent.innerHTML = `
                <div class="max-w-md mx-auto p-4 md:p-8 mt-8">
                    <div class="bg-white rounded-3xl shadow-2xl border border-slate-100 overflow-hidden">
                        <div class="bg-blue-600 p-8 text-white">
                            <h2 class="text-3xl font-bold">Ingreso al Sistema</h2>
                            <p class="opacity-80 mt-1">Solo personal autorizado</p>
                        </div>
                        <form id="login-form" class="p-8 space-y-5">
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Correo</label>
                                <input type="email" name="email" required autocomplete="username" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="usuario@dominio.com">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-400 uppercase tracking-widest mb-2">Clave</label>
                                <input type="password" name="password" required autocomplete="current-password" class="w-full p-4 bg-slate-50 border-2 border-slate-50 rounded-2xl focus:border-blue-500 focus:bg-white outline-none" placeholder="********">
                            </div>
                            <button type="submit" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-black py-4 rounded-2xl shadow-xl shadow-blue-100 transition-all transform active:scale-[0.98]">
                                INGRESAR
                            </button>
                        </form>
                    </div>
                </div>
            `;

            const loginForm = document.getElementById("login-form");
            loginForm.addEventListener("submit", async (event) => {
                event.preventDefault();
                const formData = new FormData(loginForm);
                const email = cleanText(formData.get("email")).toLowerCase();
                const password = String(formData.get("password") || "");

                if (!allowedEmails.includes(email)) {
                    showToast("Usuario no habilitado para este sistema.", "error");
                    return;
                }

                try {
                    showLoading(true);
                    await signInUser(email, password);
                    showToast("Ingreso correcto", "success");
                } catch (error) {
                    console.error("Error de login:", error);
                    showToast("No se pudo iniciar sesión", "error");
                } finally {
                    showLoading(false);
                }
            });
        }

        function createTurnoCard(turno) {
            const card = document.createElement("div");
            card.className = "group flex items-center justify-between p-5 border border-slate-100 rounded-2xl hover:border-blue-200 hover:bg-blue-50/30 transition-all bg-white shadow-sm";

            const left = document.createElement("div");
            left.className = "flex items-center gap-5";

            const hora = document.createElement("div");
            hora.className = "bg-blue-600 text-white font-black px-4 py-2 rounded-xl text-sm shadow-md shadow-blue-100";
            hora.textContent = turno.hora;

            const details = document.createElement("div");

            const paciente = document.createElement("h4");
            paciente.className = "font-bold text-slate-800 text-lg";
            paciente.textContent = turno.paciente;

            const meta = document.createElement("div");
            meta.className = "flex gap-3 mt-1";

            const medico = document.createElement("span");
            medico.className = "text-xs font-bold text-blue-500 uppercase tracking-tighter";
            medico.textContent = `Dr. ${turno.medicoId}`;

            const dni = document.createElement("span");
            dni.className = "text-xs font-medium text-slate-400";

        async function guardarTurno(event) {
            event.preventDefault();
            if (!currentUser) {
                return;
            }

            const formData = new FormData(event.target);
            const turnoData = parseTurnoForm(formData);
            const validationError = validateTurnoData(turnoData);
            if (validationError) {
                showToast(validationError, "error");
                return;
            }

            try {
                showLoading(true);

                const hayDuplicado = await existeTurnoDuplicado(turnoData);
                if (hayDuplicado) {
                    showToast("Ya existe un turno para ese profesional en ese horario.", "error");
                    return;
                }

                await saveTurno(turnoData);

                showToast("Turno confirmado", "success");
                renderDashboard();
            } catch (error) {
                console.error("Error al guardar turno:", error);
                showToast("Error al guardar el turno", "error");
            } finally {
                showLoading(false);
            }
        }

        function escapeCsvValue(value) {
            const stringValue = String(value ?? "");
            if (stringValue.includes(",") || stringValue.includes("\n") || stringValue.includes('"')) {
                return `"${stringValue.replace(/"/g, '""')}"`;
            }
            return stringValue;
        }

        async function exportarTurnosHoyCSV() {
            try {
                showLoading(true);
                const agendaDate = selectedAgendaDate;
                const turnosSorted = await getTurnosForDate(agendaDate);

                if (!turnosSorted.length) {
                    showToast("No hay turnos para exportar en la fecha seleccionada.", "error");
                    return;
                }

                const headers = ["fecha", "hora", "medico", "paciente", "dni", "telefono", "obraSocial", "primeraVez", "nota"];
                const rows = turnosSorted.map((turno) => [
                    escapeCsvValue(turno.fecha),
                    escapeCsvValue(turno.hora),
                    escapeCsvValue(turno.medicoId),
                    escapeCsvValue(turno.paciente),
                    escapeCsvValue(turno.dni),
                    escapeCsvValue(turno.telefono),
                    escapeCsvValue(turno.obraSocial),
                    escapeCsvValue(turno.primeraVez ? "SI" : "NO"),
                    escapeCsvValue(turno.nota)
                ]);

                const csvContent = [headers.join(","), ...rows.map((row) => row.join(","))].join("\n");
                const blob = new Blob([csvContent], { type: "text/csv;charset=utf-8;" });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.href = url;
                link.download = `turnos-${agendaDate}.csv`;
                document.body.appendChild(link);
                link.click();
                link.remove();
                URL.revokeObjectURL(url);

                showToast("Exportación CSV generada", "success");
            } catch (error) {
                console.error("Error al exportar CSV:", error);
                showToast("No se pudo exportar el CSV", "error");
            } finally {
                showLoading(false);
            }
        }

            const medicoSelect = document.getElementById("medico-select");
            const fechaSelect = document.getElementById("fecha-select");
            const horaSelect = document.getElementById("hora-select");
            const medicoInfo = document.getElementById("medico-info");

            const actualizarHorarios = () => {
                const medicoId = medicoSelect.value;
                const fecha = fechaSelect.value;
                horaSelect.innerHTML = '<option value="">Seleccione horario...</option>';

                if (medicoId && fecha) {
                    const horarios = getHorariosDisponibles(medicoId, fecha);
                    if (horarios.length) {
                        horaSelect.innerHTML += horarios.map((h) => `<option value="${h}">${h}</option>`).join("");
                    } else {
                        horaSelect.innerHTML += '<option disabled>Sin horarios disponibles</option>';
                    }
                }
            };

            if (medicoSelect) {
                medicoSelect.addEventListener("change", () => {

            if (!mainContent) {
                return;
            }

            const medico = medicoId ? getMedicoById(medicoId) : null;
            const title = medico ? `Editar ${medico.nombre}` : "Nuevo Médico";
            const diasSemana = ["Domingo", "Lunes", "Martes", "Miércoles", "Jueves", "Viernes", "Sábado"];

            mainContent.innerHTML = `

                                                <input type="time" id="turno-manana-fin" value="${medico?.turnos?.[0]?.horaFin || "12:30"}" class="w-full p-2 bg-white border border-slate-200 rounded-lg">

                                    <div class="bg-slate-50 p-4 rounded-2xl">

                                            <div>

            const btnVolver = document.getElementById("btn-volver");
            if (btnVolver) {
                btnVolver.addEventListener("click", renderMedicoABM);
            }

            const form = document.getElementById("form-medico");
            if (form) {
                form.addEventListener("submit", (e) => {
                    e.preventDefault();
                    
                    const diasTrabajo = Array.from(document.querySelectorAll(".dia-trabajo:checked"))
                        .map((cb) => Number(cb.value));

                    if (!diasTrabajo.length) {
                        showToast("Selecciona al menos un día de trabajo", "error");
                        return;
                    }

                    const updates = {
                        nombre: cleanText(form.nombre.value),
                        especialidad: cleanText(form.especialidad.value),
                        diasTrabajo,
                        turnos: [
                            {
                                nombre: "Mañana",
                                horaInicio: form["turno-manana-inicio"].value || "08:00",
                                horaFin: form["turno-manana-fin"].value || "12:30"

        async function renderGestionOperativa() {
            stopTurnosSubscription();
            const mainContent = getMainContent();
            if (!mainContent) {
                return;
            }

            const allTurnos = await getAllTurnos();
            const cancelaciones = readStoredCancelaciones();

            mainContent.innerHTML = `
                <div class="max-w-6xl mx-auto p-4 md:p-8">
                    <header class="mb-8">

                                        const turno = allTurnos.find((t) => t.id === c.turnoId);
                                        return `

                    const medicoId = String(e.currentTarget.dataset.medicoId);
                    imprimirTurnosPorMedico(medicoId);
                });

        function imprimirTurnosPorMedico(medicoId) {
            const medico = getMedicoById(medicoId);
            if (!medico) {
                showToast("Médico no encontrado", "error");
                return;
            }

            const turnos = readStoredTurnos().filter((t) => t.medicoId === medicoId && !isTurnoCancelado(t.id));
            const html = `
                <!DOCTYPE html>
                <html>
                <head>
                    <title>Agenda - ${medico.nombre}</title>
                    <style>
                        body { font-family: Arial, sans-serif; margin: 20px; color: #333; }
                        h1, h2 { color: #1e40af; }
                        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
                        th, td { border: 1px solid #ddd; padding: 10px; text-align: left; }
                        th { background-color: #1e40af; color: white; }
                        tr:nth-child(even) { background-color: #f9fafb; }
                        .header { margin-bottom: 20px; }
                    </style>
                </head>
                <body>
                    <div class="header">
                        <h1>Centro Médico Gallo</h1>
                        <h2>${medico.nombre} - ${medico.especialidad}</h2>
                        <p>Horario: ${medico.horaInicio} - ${medico.horaFin}</p>
                        <p>Fecha de impresión: ${new Date().toLocaleDateString("es-AR")}</p>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Fecha</th>
                                <th>Hora</th>
                                <th>Paciente</th>
                                <th>DNI</th>
                                <th>Teléfono</th>
                                <th>Obra Social</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${turnos.map((t) => `
                                <tr>
                                    <td>${t.fecha}</td>
                                    <td>${t.hora}</td>
                                    <td>${t.paciente}</td>
                                    <td>${t.dni}</td>
                                    <td>${t.telefono || "-"}</td>
                                    <td>${t.obraSocial || "S/O"}</td>
                                </tr>
                            `).join("")}
                        </tbody>
                    </table>
                </body>
                </html>
            `;

            const ventana = window.open("", "_blank");
            ventana.document.write(html);
            ventana.document.close();
            setTimeout(() => ventana.print(), 500);
        }

        async function initApp() {
            initTopNav();

            if (readStoredMedicos().length === 0) {
                createMedico("Dr. Bernaudo", "Cardiología", "08:00", "17:00");
                createMedico("Dra. Bocca", "Pediatría", "09:00", "18:00");
                createMedico("Dr. García", "Medicina General", "08:00", "17:00");
            }

            if (requestedStorageMode === "firebase") {
                const firebaseReady = await initFirebaseServices();
                if (firebaseReady) {
                    activeStorageMode = "firebase";
                } else {
                    activeStorageMode = "local";
                    showToast("Firebase no disponible. Se activó modo local.", "error");
                    restoreSession();
                }
            } else {
                activeStorageMode = "local";
                restoreSession();
            }

            const mainContent = getMainContent();
            if (mainContent) {
                mainContent.setAttribute("data-storage-mode", activeStorageMode);
            }

            if (authUnsubscribe) {
                authUnsubscribe();
                authUnsubscribe = null;
            }

            authUnsubscribe = subscribeAuthState(async (user) => {
                currentUser = user;

                if (!user) {
                    renderLogin();
                    return;
                }

                if (!isAllowedUser(user)) {
                    await signOutUser();
                    showToast("Usuario no autorizado", "error");
                    return;
                }

                renderDashboard();
            });
        }

        window.renderDashboard = renderDashboard;
        window.onload = initApp;
    </script>
